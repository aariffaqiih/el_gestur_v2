<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Presentasi - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1.5rem;
            padding: 2rem;
            flex-grow: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .glass-panel {
            background: var(--panel-bg);
            border-radius: 1rem;
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Video Section */
        .video-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 0.75rem;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-placeholder {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
        }

        .video-placeholder i {
            font-size: 3rem;
        }

        /* Controls Section */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
        }
        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.3);
        }
        .btn-success:hover { background: rgba(16, 185, 129, 0.3); }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border-color: rgba(239, 68, 68, 0.3);
        }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.3); }

        /* Status Cards */
        .status-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .status-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0.5rem;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-value {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 800;
        }
        .badge-active { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge-inactive { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .badge-warning { background: rgba(245, 158, 11, 0.2); color: var(--warning); }

        /* Software Selector */
        .software-selector {
            margin-bottom: 1.5rem;
        }
        .software-selector h3 {
            font-size: 1rem;
            margin-bottom: 0.75rem;
            color: var(--text-muted);
        }
        .software-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }
        .software-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .software-btn.active {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-color: var(--primary);
        }

        /* Voice Typer Section */
        .voice-section {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
        }
        
        .voice-section h3 {
            font-size: 1rem;
            margin-bottom: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .voice-text-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 0.5rem;
            padding: 1rem;
            min-height: 80px;
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 1rem;
            word-wrap: break-word;
        }

        /* Pulse animation */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .recording .fa-microphone {
            color: var(--danger);
            animation: pulse 2s infinite;
            border-radius: 50%;
        }

        /* API Base URL config */
        .api-config {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.5);
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            El Presentasi
        </div>
        <div id="connection-status" class="status-badge badge-warning">Connecting...</div>
    </header>

    <div class="container">
        <!-- Main Video Panel -->
        <div class="glass-panel video-section">
            <div class="video-container">
                <div class="video-placeholder" id="video-placeholder">
                    <i class="fa-solid fa-camera-slash"></i>
                    <p>Video Feed Offline</p>
                </div>
                <img id="video-stream" src="" alt="Video Feed" style="display: none;" onerror="handleImageError()">
            </div>
            
            <div class="status-container" style="flex-direction: row; flex-wrap: wrap;">
                <div class="status-card" style="flex: 1;">
                    <div class="status-label">Gestur Terakhir</div>
                    <div class="status-value" id="val-gesture">--</div>
                </div>
                <div class="status-card" style="flex: 1;">
                    <div class="status-label">Target ID</div>
                    <div class="status-value" id="val-locked-id">--</div>
                </div>
            </div>
        </div>

        <!-- Sidebar Controls -->
        <div class="glass-panel">
            <div class="controls-grid">
                <button class="btn btn-success" onclick="apiCall('start')">
                    <i class="fa-solid fa-play"></i> Start Engine
                </button>
                <button class="btn btn-danger" onclick="apiCall('stop')">
                    <i class="fa-solid fa-stop"></i> Stop Engine
                </button>
                <button class="btn" onclick="apiCall('lock')">
                    <i class="fa-solid fa-lock"></i> Lock Target
                </button>
                <button class="btn" onclick="apiCall('unlock')">
                    <i class="fa-solid fa-unlock"></i> Unlock Target
                </button>
            </div>

            <div class="status-card" style="margin-bottom: 1.5rem;">
                <div class="status-label">Status Engine</div>
                <div class="status-badge badge-inactive" id="status-engine">OFFLINE</div>
            </div>

            <!-- Software Selector -->
            <div class="software-selector">
                <h3><i class="fa-solid fa-layer-group"></i> Software Profil</h3>
                <div class="software-grid">
                    <button class="software-btn active" id="btn-ppt" onclick="setSoftware('ppt')">PowerPoint</button>
                    <button class="software-btn" id="btn-canva" onclick="setSoftware('canva')">Canva</button>
                    <button class="software-btn" id="btn-figma" onclick="setSoftware('figma')">Figma</button>
                    <button class="software-btn" id="btn-notion" onclick="setSoftware('notion')">Notion</button>
                </div>
            </div>

            <!-- Voice Typer Section -->
            <div class="voice-section">
                <h3>
                    <i class="fa-solid fa-microphone" id="voice-icon"></i> Voice Typer 
                    <span id="voice-status-badge" class="status-badge badge-inactive" style="margin-left: auto;">Idle</span>
                </h3>
                <div class="controls-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 1rem;">
                    <button class="btn btn-primary" onclick="toggleBrowserVoice(true)">Mulai Dengar</button>
                    <button class="btn" onclick="toggleBrowserVoice(false)">Berhenti</button>
                </div>
                <div class="voice-text-box" id="voice-text">
                    Teks yang diucapkan akan muncul di sini...
                </div>
            </div>
        </div>
    </div>

    <div class="api-config">
        API: <input type="text" id="api-url" value="http://127.0.0.1:5000" style="background:transparent; border:none; color:white; border-bottom: 1px solid gray;">
    </div>

    <script>
        // API Base URL
        const getBaseUrl = () => document.getElementById('api-url').value;

        // Elements
        const elConnStatus = document.getElementById('connection-status');
        const elEngineStatus = document.getElementById('status-engine');
        const elGesture = document.getElementById('val-gesture');
        const elLockedId = document.getElementById('val-locked-id');
        const elVoiceIcon = document.getElementById('voice-icon');
        const elVoiceBadge = document.getElementById('voice-status-badge');
        const elVoiceText = document.getElementById('voice-text');
        
        const videoStream = document.getElementById('video-stream');
        const videoPlaceholder = document.getElementById('video-placeholder');

        // Browser Speech Recognition state
        let recognition = null;
        let isBrowserVoiceRunning = false;

        async function toggleBrowserVoice(start) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                console.warn("Browser does not support Web Speech API. Falling back to backend VoiceTyper.");
                if (start) {
                    await apiCall('voice_start');
                } else {
                    await apiCall('voice_stop');
                }
                return;
            }

            if (start) {
                if (isBrowserVoiceRunning) return;
                
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'id-ID';

                recognition.onstart = () => {
                    isBrowserVoiceRunning = true;
                    elVoiceIcon.parentElement.classList.add('recording');
                    elVoiceBadge.textContent = "LISTENING";
                    elVoiceBadge.className = "status-badge badge-active";
                    elVoiceText.textContent = "Mendengarkan langsung secara real-time...";
                };

                recognition.onresult = async (event) => {
                    let finalTranscript = '';
                    let interimTranscript = '';

                    for (let i = 0; i < event.results.length; ++i) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalTranscript += transcript;
                        } else {
                            interimTranscript += transcript;
                        }
                    }

                    // Tampilkan output secara real-time
                    elVoiceText.innerHTML = `
                        <span>${finalTranscript}</span>
                        <span style="color: var(--text-muted); font-style: italic;">${interimTranscript}</span>
                    `;

                    // Hanya kirim teks final ke backend untuk diketik
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            const text = event.results[i][0].transcript.trim();
                            if (text) {
                                console.log("Sending speech text to backend:", text);
                                await apiCall('type', 'POST', { text });
                            }
                        }
                    }
                };

                recognition.onerror = (event) => {
                    console.error("Speech recognition error:", event.error);
                    if (event.error !== 'no-speech') {
                        elVoiceText.textContent = `Error: ${event.error}`;
                        elVoiceText.style.color = 'var(--danger)';
                        stopBrowserVoice();
                    }
                };

                recognition.onend = () => {
                    // Automatically restart if it was stopped unexpectedly by browser timeout
                    if (isBrowserVoiceRunning && recognition) {
                        try {
                            recognition.start();
                        } catch (e) {
                            stopBrowserVoice();
                        }
                    }
                };

                recognition.start();
            } else {
                stopBrowserVoice();
            }
        }

        function stopBrowserVoice() {
            isBrowserVoiceRunning = false;
            if (recognition) {
                try { recognition.stop(); } catch(e){}
                recognition = null;
            }
            elVoiceIcon.parentElement.classList.remove('recording');
            elVoiceBadge.textContent = "IDLE";
            elVoiceBadge.className = "status-badge badge-inactive";
        }

        // Setup Video Feed
        function updateVideoFeed() {
            videoStream.src = `${getBaseUrl()}/video_feed?t=${new Date().getTime()}`;
            videoStream.style.display = 'block';
            videoPlaceholder.style.display = 'none';
        }

        function handleImageError() {
            videoStream.style.display = 'none';
            videoPlaceholder.style.display = 'flex';
        }

        // Generic API Caller
        async function apiCall(endpoint, method = 'POST', body = null) {
            try {
                const options = { method };
                if (body) {
                    options.headers = { 'Content-Type': 'application/json' };
                    options.body = JSON.stringify(body);
                }
                const res = await fetch(`${getBaseUrl()}/${endpoint}`, options);
                const data = await res.json();
                console.log(`[${endpoint}] Response:`, data);
                if(endpoint === 'start') updateVideoFeed();
                return data;
            } catch (err) {
                console.error(`[${endpoint}] Error:`, err);
            }
        }

        // Set Software
        function setSoftware(software) {
            // Update UI
            document.querySelectorAll('.software-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${software}`).classList.add('active');
            
            // Call API
            apiCall('set_software', 'POST', { software });
        }

        // Polling Status
        async function pollStatus() {
            try {
                const res = await fetch(`${getBaseUrl()}/status`);
                if (!res.ok) throw new Error("Network not ok");
                const data = await res.json();
                
                // Connection Status
                elConnStatus.textContent = "Connected";
                elConnStatus.className = "status-badge badge-active";
                
                // Engine Status
                if (data.is_active) {
                    elEngineStatus.textContent = "ONLINE";
                    elEngineStatus.className = "status-badge badge-active";
                    if (videoStream.style.display === 'none' && !videoStream.src.includes('video_feed')) {
                        updateVideoFeed();
                    }
                } else {
                    elEngineStatus.textContent = "STANDBY";
                    elEngineStatus.className = "status-badge badge-warning";
                }

                // Values
                elLockedId.textContent = data.locked_id || "None";
                elGesture.textContent = data.gesture_status || "--";

                // Update Software UI based on backend state
                if (data.current_software) {
                    document.querySelectorAll('.software-btn').forEach(btn => btn.classList.remove('active'));
                    const btn = document.getElementById(`btn-${data.current_software}`);
                    if (btn) btn.classList.add('active');
                }

                // Voice Typer Status
                if (data.voice_typer) {
                    const vt = data.voice_typer;
                    if (isBrowserVoiceRunning) {
                        elVoiceIcon.parentElement.classList.add('recording');
                        elVoiceBadge.textContent = "LISTENING";
                        elVoiceBadge.className = "status-badge badge-active";
                    } else if (vt.is_running) {
                        elVoiceIcon.parentElement.classList.add('recording');
                        elVoiceBadge.textContent = vt.status.toUpperCase();
                        elVoiceBadge.className = "status-badge badge-active";
                    } else {
                        elVoiceIcon.parentElement.classList.remove('recording');
                        elVoiceBadge.textContent = "IDLE";
                        elVoiceBadge.className = "status-badge badge-inactive";
                    }
                    if (vt.last_text) {
                        elVoiceText.textContent = vt.last_text;
                    }
                    if (vt.error && !isBrowserVoiceRunning) {
                        elVoiceText.textContent = `Error: ${vt.error}`;
                        elVoiceText.style.color = 'var(--danger)';
                    } else {
                        elVoiceText.style.color = 'var(--text-main)';
                    }
                }

            } catch (err) {
                elConnStatus.textContent = "Disconnected";
                elConnStatus.className = "status-badge badge-inactive";
            }
        }

        // Initialize
        document.getElementById('api-url').addEventListener('change', updateVideoFeed);
        
        // Start polling
        setInterval(pollStatus, 1000);
        pollStatus(); // Initial poll
    </script>
</body>
</html>
